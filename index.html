<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kira Clinic Online – Home</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon">
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page-home">
    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo-box">
          <img
            src="./img/logo.png"
            alt="Kira clinic Logo"
          />
        </div>

        <div class="header-right">
          <h1 class="site-title">KIRA CLINIC ONLINE</h1>
          <nav class="nav">
            <a href="index.html" class="nav-link active-pill">HOME</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="b-app.html" class="nav-link nav-pill-outline"
              >Book<br />Appointment</a
            >
            <a href="contact.html" class="nav-link">Contact</a>
          </nav>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero fade-in-up">
      <div class="hero-image-wrap">
        <img
          src="./img/doctors-in-kira-clininc.png"
          alt="Kira Clinic Team"
          class="hero-img"
        />
        <div class="hero-logo-overlay">
          <div class="logo-icon small">
            <svg
              viewBox="0 0 40 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="40" height="40" rx="8" fill="#1565C0" />
              <rect x="17" y="8" width="6" height="24" rx="3" fill="white" />
              <rect x="8" y="17" width="24" height="6" rx="3" fill="white" />
            </svg>
          </div>
          <span>KIRA CLINIC</span>
        </div>
      </div>
      <div class="hero-text fade-in-up delay-1">
        <h2 class="hero-heading">
          WELCOME To<br /><span class="hero-brand">KIRA CLINIC</span>
        </h2>
        <p class="hero-sub">Your Health, Our Priority</p>
      </div>
    </section>

    <!-- SERVICES PREVIEW -->
    <section class="section-services fade-in-up delay-2">
      <h3 class="section-heading">Our Services</h3>
      <div class="service-cards">
        <div class="service-card hover-lift">
          <h4 class="service-card-title">Treatment</h4>
          <img
            src="./img/images-removebg-preview.png"
            alt="Treatment"
            class="service-icon"
          />
        </div>
        <div class="service-card hover-lift">
          <h4 class="service-card-title">Laboratory</h4>
          <img
            src="./img/download (1).jpg"
            alt="Laboratory"
            class="service-icon"
          />
        </div>
        <div class="service-card hover-lift">
          <h4 class="service-card-title">Vaccination</h4>
          <img
            src="./img/Syringe_Full_icon-icons.com_75049.png"
            alt="Vaccination"
            class="service-icon"
          />
        </div>
      </div>
      <a href="b-app.html" class="btn-book pulse">Book Appointment</a>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>Providing Quality Healthcare in Nyagatare</p>
      <p>&copy; 2026 - KIRA CLINIC ONLINE</p>
      <p>Your Health, Our Priority</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
